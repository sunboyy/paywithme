<?xml version="1.0" encoding="UTF-8"?>
<!--
  "Pay with me" app icon — source of truth.

  Concept: a single coin split into two equal halves down a vertical seam — the
  literal "split the bill / share the cost" mark of an expense-splitting app.
  Two dots straddling the seam read as a division "÷" (split evenly) and as two
  people sharing one coin.

  Palette (PLAN §10 neutral/slate):
    - background : slate-900  #0f172a  (matches THEME_COLOR)
    - left half  : slate-100  #f1f5f9  (light)
    - right half : slate-400  #94a3b8  (mid) — the seam stays legible on both
                   light and dark device chrome.
    - dots / seam: slate-900  #0f172a  carved out of the coin.

  This is the full-bleed ("any") artwork. The coin fills most of the canvas;
  platform "any" icons are shown un-masked so edge-to-edge is fine.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Pay with me">
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- Coin -->
  <g>
    <!-- left half (light) -->
    <path d="M256 88 a168 168 0 0 0 0 336 Z" fill="#f1f5f9"/>
    <!-- right half (mid) -->
    <path d="M256 88 a168 168 0 0 1 0 336 Z" fill="#94a3b8"/>
    <!-- seam carved out of the coin so the split is unmistakable -->
    <rect x="247" y="88" width="18" height="336" fill="#0f172a"/>
    <!-- division dots straddling the seam: split evenly -->
    <circle cx="256" cy="176" r="26" fill="#0f172a"/>
    <circle cx="256" cy="336" r="26" fill="#0f172a"/>
  </g>
</svg>
